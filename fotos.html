<!doctype html>

  <head>
    <meta charset="UTF-8" />

    <link rel="stylesheet" href="styles.css" />

    <style>
      body {
        padding: 100px 20px;
        display: flex;
        flex-wrap: wrap;
        gap: 40px;
        justify-content: center;
      }

      .polaroid {
        background: white;
        padding: 15px;
        width: 200px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        transition: 0.3s;
        cursor: pointer;
      }

      .polaroid img {
        width: 100%;
      }

      .polaroid p {
        margin-top: 10px;
        text-align: center;
      }

      .polaroid:hover {
        transform: translateY(-10px) rotate(-2deg);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      }

      .back {
        position: fixed;
        top: 30px;
        left: 30px;
        font-size: 40px;
        color: white;
        text-decoration: none;
        cursor: pointer;
      }

      .back:hover {
        transform: scale(1.1);
      }
      @media (max-width: 768px) {
        body {
          padding-top: 120px;
          gap: 20px;
        }

        .polaroid {
          width: 140px;
        }
      }
    </style>
  </head>

  <body>
    <a href="index.html" class="back">❮</a>
